<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AutoMarket DZ</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p>Log in to your AutoMarket DZ account</p>
      
      <div id="login-error" class="alert alert-danger" style="display:none;"></div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-submit" id="login-btn">Login</button>
      </form>

      <div class="auth-link">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
      <div class="auth-link" style="margin-top:8px;">
        <a href="../index.html">← Back to home</a>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errorDiv = document.getElementById('login-error');
      
      btn.textContent = 'Logging in...';
      btn.disabled = true;
      errorDiv.style.display = 'none';

      try {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        await login(email, password);
        showToast('Login successful!', 'success');
        
        // Redirect based on role
        const user = state.user;
        if (user.role === 'admin' || user.role === 'founder' || user.role === 'employee') {
          window.location.href = '/admin-dashboard/index.html';
        } else if (user.role === 'seller') {
          window.location.href = '/seller-dashboard/index.html';
        } else {
          window.location.href = '/';
        }
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
      } finally {
        btn.textContent = 'Login';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
