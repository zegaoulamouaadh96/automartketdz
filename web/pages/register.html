<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - AutoMarket DZ</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card" style="max-width:520px;">
      <h2>Create Account</h2>
      <p>Join AutoMarket DZ marketplace</p>

      <div id="register-error" class="alert alert-danger" style="display:none;"></div>

      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="reg-first-name" placeholder="Ahmed" required>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="reg-last-name" placeholder="Benali" required>
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="reg-phone" placeholder="0555 000 000">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Minimum 6 characters" required minlength="6">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Wilaya</label>
            <select id="reg-wilaya">
              <option value="">Select wilaya</option>
            </select>
          </div>
          <div class="form-group">
            <label>Account Type</label>
            <select id="reg-role">
              <option value="buyer">Buyer</option>
              <option value="seller">Seller</option>
              <option value="supplier">Supplier</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn-submit" id="register-btn">Create Account</button>
      </form>

      <div class="auth-link">
        Already have an account? <a href="login.html">Login here</a>
      </div>
      <div class="auth-link" style="margin-top:8px;">
        <a href="../index.html">← Back to home</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Load wilayas
    async function loadWilayas() {
      try {
        const data = await api('/wilayas');
        const select = document.getElementById('reg-wilaya');
        data.wilayas.forEach(w => {
          const opt = document.createElement('option');
          opt.value = w;
          opt.textContent = w;
          select.appendChild(opt);
        });
      } catch (e) {
        console.error('Error loading wilayas:', e);
      }
    }
    loadWilayas();

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      const errorDiv = document.getElementById('register-error');

      btn.textContent = 'Creating account...';
      btn.disabled = true;
      errorDiv.style.display = 'none';

      try {
        await register({
          first_name: document.getElementById('reg-first-name').value,
          last_name: document.getElementById('reg-last-name').value,
          email: document.getElementById('reg-email').value,
          phone: document.getElementById('reg-phone').value,
          password: document.getElementById('reg-password').value,
          wilaya: document.getElementById('reg-wilaya').value,
          role: document.getElementById('reg-role').value,
        });
        showToast('Account created successfully!', 'success');
        window.location.href = '../index.html';
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
      } finally {
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
