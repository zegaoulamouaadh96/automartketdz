<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Store Settings - Seller Dashboard</title>
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <div class="topbar"><h1>🏪 Store Settings</h1></div>
      <div class="page-content">
        <div class="card">
          <h3>Store Information</h3>
          <form id="store-form" onsubmit="saveStore(event)">
            <div class="form-row">
              <div class="form-group">
                <label>Store Name *</label>
                <input type="text" id="store-name" required>
              </div>
              <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="store-phone">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Email</label>
                <input type="email" id="store-email">
              </div>
              <div class="form-group">
                <label>Wilaya *</label>
                <select id="store-wilaya" required>
                  <option value="">Select Wilaya</option>
                  <option value="Alger">Alger</option><option value="Oran">Oran</option>
                  <option value="Constantine">Constantine</option><option value="Annaba">Annaba</option>
                  <option value="Blida">Blida</option><option value="Sétif">Sétif</option>
                  <option value="Batna">Batna</option><option value="Tizi Ouzou">Tizi Ouzou</option>
                  <option value="Béjaïa">Béjaïa</option><option value="Tipaza">Tipaza</option>
                  <option value="Boumerdès">Boumerdès</option><option value="Mostaganem">Mostaganem</option>
                  <option value="Chlef">Chlef</option><option value="Tlemcen">Tlemcen</option>
                  <option value="Médéa">Médéa</option><option value="Biskra">Biskra</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>Address</label>
              <input type="text" id="store-address">
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea id="store-description" rows="4"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </form>
        </div>

        <div class="card" id="create-store-card" style="display:none;">
          <h3>Create Your Store</h3>
          <p style="margin-bottom:15px;color:var(--gray);">You don't have a store yet. Create one to start selling.</p>
          <form id="create-store-form" onsubmit="createStore(event)">
            <div class="form-group">
              <label>Store Name *</label>
              <input type="text" id="new-store-name" required>
            </div>
            <div class="form-group">
              <label>Wilaya *</label>
              <select id="new-store-wilaya" required>
                <option value="">Select Wilaya</option>
                <option value="Alger">Alger</option><option value="Oran">Oran</option>
                <option value="Constantine">Constantine</option><option value="Annaba">Annaba</option>
                <option value="Blida">Blida</option><option value="Sétif">Sétif</option>
              </select>
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea id="new-store-desc" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Create Store</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/dashboard.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!checkAuth()) return;
      document.getElementById('sidebar').innerHTML = renderSidebar('store');
      loadStore();
    });

    async function loadStore() {
      const res = await apiRequest('/stores/my');
      if (res && res.ok) {
        const s = res.data.store;
        document.getElementById('store-name').value = s.name || '';
        document.getElementById('store-phone').value = s.phone || '';
        document.getElementById('store-email').value = s.email || '';
        document.getElementById('store-wilaya').value = s.wilaya || '';
        document.getElementById('store-address').value = s.address || '';
        document.getElementById('store-description').value = s.description || '';
        document.getElementById('store-form').closest('.card').style.display = 'block';
        document.getElementById('create-store-card').style.display = 'none';
      } else {
        document.getElementById('store-form').closest('.card').style.display = 'none';
        document.getElementById('create-store-card').style.display = 'block';
      }
    }

    async function saveStore(e) {
      e.preventDefault();
      const res = await apiRequest('/stores/my', {
        method: 'PUT',
        body: JSON.stringify({
          name: document.getElementById('store-name').value,
          phone: document.getElementById('store-phone').value,
          email: document.getElementById('store-email').value,
          wilaya: document.getElementById('store-wilaya').value,
          address: document.getElementById('store-address').value,
          description: document.getElementById('store-description').value,
        }),
      });
      if (res && res.ok) {
        showNotification('Store updated!');
      } else {
        showNotification(res?.data?.error || 'Failed to update', 'danger');
      }
    }

    async function createStore(e) {
      e.preventDefault();
      const res = await apiRequest('/stores', {
        method: 'POST',
        body: JSON.stringify({
          name: document.getElementById('new-store-name').value,
          wilaya: document.getElementById('new-store-wilaya').value,
          description: document.getElementById('new-store-desc').value,
        }),
      });
      if (res && res.ok) {
        showNotification('Store created!');
        loadStore();
      } else {
        showNotification(res?.data?.error || 'Failed to create store', 'danger');
      }
    }
  </script>
</body>
</html>
