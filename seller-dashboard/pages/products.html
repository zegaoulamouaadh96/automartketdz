<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Seller Dashboard</title>
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <div class="dashboard-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-content">
      <div class="topbar">
        <h1>📦 Products</h1>
        <div class="topbar-actions">
          <button class="btn btn-primary" onclick="showAddProduct()">+ Add Product</button>
        </div>
      </div>

      <div class="page-content">
        <div class="table-container">
          <div class="table-header">
            <h3>All Products</h3>
            <input type="text" placeholder="Search products..." style="padding:8px 12px;border:1px solid #E2E8F0;border-radius:6px;" onkeyup="searchProducts(this.value)">
          </div>
          <table>
            <thead>
              <tr>
                <th>Product</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="products-table">
              <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
            </tbody>
          </table>
        </div>
        <div id="pagination"></div>
      </div>
    </div>
  </div>

  <!-- ADD/EDIT PRODUCT MODAL -->
  <div class="modal-overlay" id="product-modal" style="display:none;">
    <div class="modal">
      <h2>
        <span id="modal-title">Add Product</span>
        <button onclick="closeModal()" style="background:none;font-size:20px;">✕</button>
      </h2>
      <form id="product-form" onsubmit="saveProduct(event)">
        <input type="hidden" id="product-id">
        <div class="form-row">
          <div class="form-group">
            <label>Product Name *</label>
            <input type="text" id="prod-name" required>
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="prod-category"></select>
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="prod-description" rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Price (DA) *</label>
            <input type="number" id="prod-price" required min="0" step="0.01">
          </div>
          <div class="form-group">
            <label>Original Price (DA)</label>
            <input type="number" id="prod-original-price" min="0" step="0.01">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Quantity *</label>
            <input type="number" id="prod-quantity" required min="0" value="1">
          </div>
          <div class="form-group">
            <label>Condition</label>
            <select id="prod-condition">
              <option value="new">New</option>
              <option value="used">Used</option>
              <option value="refurbished">Refurbished</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>SKU</label>
            <input type="text" id="prod-sku">
          </div>
          <div class="form-group">
            <label>Warranty</label>
            <input type="text" id="prod-warranty" placeholder="e.g., 6 months">
          </div>
        </div>
        <div class="form-group">
          <label>Product Images</label>
          <input type="file" id="prod-images" multiple accept="image/*">
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;">
          <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/dashboard.js"></script>
  <script>
    let allProducts = [];
    let currentPage = 1;

    document.addEventListener('DOMContentLoaded', () => {
      if (!checkAuth()) return;
      document.getElementById('sidebar').innerHTML = renderSidebar('products');
      loadCategories();
      loadProducts();
    });

    async function loadCategories() {
      const res = await apiRequest('/general/categories');
      if (res && res.ok) {
        const select = document.getElementById('prod-category');
        select.innerHTML = '<option value="">Select Category</option>' +
          res.data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      }
    }

    async function loadProducts(page = 1) {
      currentPage = page;
      const res = await apiRequest(`/products/my?page=${page}&limit=15`);
      if (res && res.ok) {
        allProducts = res.data.data || [];
        renderProducts(allProducts);
      }
    }

    function renderProducts(products) {
      const tbody = document.getElementById('products-table');
      if (products.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:#64748B;">No products yet. Click "Add Product" to start.</td></tr>';
        return;
      }
      tbody.innerHTML = products.map(p => `
        <tr>
          <td>
            <div style="display:flex;align-items:center;gap:10px;">
              <img src="${p.primary_image || 'https://via.placeholder.com/40x40?text=P'}" style="width:40px;height:40px;border-radius:6px;object-fit:cover;">
              <div>
                <strong>${p.name}</strong>
                <div style="font-size:12px;color:#64748B;">${p.slug}</div>
              </div>
            </div>
          </td>
          <td>${p.category_name || '-'}</td>
          <td><strong>${formatPrice(p.price)}</strong></td>
          <td><span class="badge ${p.quantity > 0 ? 'badge-success' : 'badge-danger'}">${p.quantity}</span></td>
          <td><span class="badge ${p.is_active ? 'badge-success' : 'badge-danger'}">${p.is_active ? 'Active' : 'Inactive'}</span></td>
          <td>
            <button class="btn btn-outline btn-sm" onclick="editProduct('${p.id}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.id}')">🗑️</button>
          </td>
        </tr>
      `).join('');
    }

    function searchProducts(query) {
      const filtered = allProducts.filter(p => p.name.toLowerCase().includes(query.toLowerCase()));
      renderProducts(filtered);
    }

    function showAddProduct() {
      document.getElementById('modal-title').textContent = 'Add Product';
      document.getElementById('product-form').reset();
      document.getElementById('product-id').value = '';
      document.getElementById('product-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('product-modal').style.display = 'none';
    }

    async function editProduct(id) {
      const res = await apiRequest(`/products/${id}`);
      if (res && res.ok) {
        const p = res.data.product;
        document.getElementById('modal-title').textContent = 'Edit Product';
        document.getElementById('product-id').value = p.id;
        document.getElementById('prod-name').value = p.name;
        document.getElementById('prod-category').value = p.category_id || '';
        document.getElementById('prod-description').value = p.description || '';
        document.getElementById('prod-price').value = p.price;
        document.getElementById('prod-original-price').value = p.original_price || '';
        document.getElementById('prod-quantity').value = p.quantity;
        document.getElementById('prod-condition').value = p.condition;
        document.getElementById('prod-sku').value = p.sku || '';
        document.getElementById('prod-warranty').value = p.warranty || '';
        document.getElementById('product-modal').style.display = 'flex';
      }
    }

    async function saveProduct(e) {
      e.preventDefault();
      const productId = document.getElementById('product-id').value;
      const productData = {
        name: document.getElementById('prod-name').value,
        category_id: document.getElementById('prod-category').value || null,
        description: document.getElementById('prod-description').value,
        price: parseFloat(document.getElementById('prod-price').value),
        original_price: parseFloat(document.getElementById('prod-original-price').value) || null,
        quantity: parseInt(document.getElementById('prod-quantity').value),
        condition: document.getElementById('prod-condition').value,
        sku: document.getElementById('prod-sku').value,
        warranty: document.getElementById('prod-warranty').value,
      };

      let res;
      if (productId) {
        res = await apiRequest(`/products/${productId}`, {
          method: 'PUT',
          body: JSON.stringify(productData),
        });
      } else {
        res = await apiRequest('/products', {
          method: 'POST',
          body: JSON.stringify(productData),
        });
      }

      if (res && res.ok) {
        showNotification(productId ? 'Product updated!' : 'Product added!');
        closeModal();
        loadProducts(currentPage);
      } else {
        showNotification(res?.data?.error || 'Failed to save product', 'danger');
      }
    }

    async function deleteProduct(id) {
      if (!confirm('Are you sure you want to delete this product?')) return;
      const res = await apiRequest(`/products/${id}`, { method: 'DELETE' });
      if (res && res.ok) {
        showNotification('Product deleted');
        loadProducts(currentPage);
      } else {
        showNotification('Failed to delete product', 'danger');
      }
    }
  </script>
</body>
</html>
