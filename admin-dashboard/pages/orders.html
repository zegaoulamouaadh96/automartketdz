<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الطلبات - AutoMarket DZ</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="dashboard-layout">
    <aside class="sidebar"></aside>
    <main class="main-content">
        <div class="topbar">
            <h1>🛒 إدارة الطلبات</h1>
            <div class="topbar-actions">
                <select id="statusFilter" class="search-input" onchange="loadOrders(1)">
                    <option value="">كل الحالات</option>
                    <option value="pending">بانتظار</option>
                    <option value="confirmed">مؤكد</option>
                    <option value="processing">قيد التحضير</option>
                    <option value="shipped">تم الشحن</option>
                    <option value="delivered">تم التوصيل</option>
                    <option value="cancelled">ملغي</option>
                </select>
                <input type="text" id="searchInput" class="search-input" placeholder="بحث برقم الطلب..." oninput="clearTimeout(window._st);window._st=setTimeout(()=>loadOrders(1),400)">
            </div>
        </div>
        <div class="page-content">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-icon orange">⏳</div><h3 id="pendingCount">-</h3><p>بانتظار</p></div>
                <div class="stat-card"><div class="stat-icon blue">📦</div><h3 id="processingCount">-</h3><p>قيد التحضير</p></div>
                <div class="stat-card"><div class="stat-icon purple">🚚</div><h3 id="shippedCount">-</h3><p>تم الشحن</p></div>
                <div class="stat-card"><div class="stat-icon green">✅</div><h3 id="deliveredCount">-</h3><p>تم التوصيل</p></div>
                <div class="stat-card"><div class="stat-icon red">❌</div><h3 id="cancelledCount">-</h3><p>ملغي</p></div>
            </div>

            <div class="table-container">
                <div class="table-header">
                    <h3>قائمة الطلبات</h3>
                    <span id="orderTotal" style="font-size:13px;color:var(--gray);"></span>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>رقم الطلب</th>
                            <th>المشتري</th>
                            <th>المتجر</th>
                            <th>المبلغ</th>
                            <th>طريقة الدفع</th>
                            <th>الحالة</th>
                            <th>التاريخ</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTable"><tr><td colspan="8"><div class="loading-spinner"></div></td></tr></tbody>
                </table>
            </div>
            <div id="pagination"></div>
        </div>
    </main>
</div>
<div id="orderModal" style="display:none;"></div>
<script src="../js/admin.js"></script>
<script>
    const auth = checkAuth();
    if (auth) { renderSidebar('orders'); loadOrders(1); }

    const paymentMap = { cash_on_delivery: 'الدفع عند الاستلام', ccp: 'CCP', baridimob: 'بريدي موب', bank_transfer: 'تحويل بنكي' };

    async function loadOrders(page = 1) {
        const status = document.getElementById('statusFilter').value;
        const search = document.getElementById('searchInput').value;
        try {
            const params = new URLSearchParams({ page, limit: 20 });
            if (status) params.append('status', status);
            if (search) params.append('search', search);
            const res = await apiRequest(`/admin/orders?${params}`);
            const orders = res.data || res.orders || [];

            if (res.stats) {
                document.getElementById('pendingCount').textContent = res.stats.pending || 0;
                document.getElementById('processingCount').textContent = res.stats.processing || 0;
                document.getElementById('shippedCount').textContent = res.stats.shipped || 0;
                document.getElementById('deliveredCount').textContent = res.stats.delivered || 0;
                document.getElementById('cancelledCount').textContent = res.stats.cancelled || 0;
            }

            document.getElementById('orderTotal').textContent = `عرض ${orders.length} من ${res.pagination?.total || orders.length}`;

            document.getElementById('ordersTable').innerHTML = orders.map(o => `
                <tr>
                    <td><strong>#${o.order_number || '-'}</strong></td>
                    <td>${o.buyer_first_name ? o.buyer_first_name + ' ' + o.buyer_last_name : o.buyer_name || '-'}</td>
                    <td style="font-size:13px;">${o.store_name || '-'}</td>
                    <td style="font-weight:600;">${formatPrice(o.total_amount || o.total)}</td>
                    <td style="font-size:13px;">${paymentMap[o.payment_method] || o.payment_method || '-'}</td>
                    <td>${getStatusBadge(o.status)}</td>
                    <td style="font-size:12px;color:var(--gray);">${timeAgo(o.created_at)}</td>
                    <td>
                        <button class="btn btn-sm btn-outline" onclick="viewOrder('${o.id}')" title="تفاصيل">👁️</button>
                    </td>
                </tr>
            `).join('');

            if (orders.length === 0) showEmpty('ordersTable', '🛒', 'لا يوجد طلبات', 'لم يتم العثور على طلبات بهذه المعايير');
            if (res.pagination) renderPagination('pagination', res.pagination, 'loadOrders');
        } catch (err) {
            showNotification(err.message, 'error');
        }
    }

    async function viewOrder(id) {
        try {
            const res = await apiRequest(`/admin/orders/${id}`);
            const o = res.data || res.order || res;
            const items = o.items || [];
            const buyerName = o.buyer_name || (o.buyer_first_name ? o.buyer_first_name + ' ' + o.buyer_last_name : '-');

            // Status flow visual
            const statuses = ['pending', 'confirmed', 'processing', 'shipped', 'delivered'];
            const statusLabels = { pending: 'بانتظار', confirmed: 'مؤكد', processing: 'تحضير', shipped: 'شحن', delivered: 'توصيل' };
            const currentIdx = statuses.indexOf(o.status);
            const isCancelled = o.status === 'cancelled';

            let statusFlow = '';
            if (!isCancelled) {
                statusFlow = `<div style="display:flex;align-items:center;gap:4px;margin:16px 0;flex-wrap:wrap;">
                    ${statuses.map((s, i) => `
                        <div style="padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;
                            background:${i <= currentIdx ? 'var(--primary)' : 'var(--gray-light)'};
                            color:${i <= currentIdx ? 'white' : 'var(--gray)'};">
                            ${statusLabels[s]}
                        </div>
                        ${i < statuses.length - 1 ? '<span style="color:var(--gray);">→</span>' : ''}
                    `).join('')}
                </div>`;
            } else {
                statusFlow = `<div style="padding:12px;background:#FEE2E2;border-radius:8px;margin:16px 0;text-align:center;font-weight:600;color:#991B1B;">❌ هذا الطلب ملغي</div>`;
            }

            document.getElementById('orderModal').style.display = '';
            document.getElementById('orderModal').innerHTML = `
                <div class="modal-overlay" onclick="closeModal()">
                    <div class="modal" onclick="event.stopPropagation()" style="max-width:680px;">
                        <h2 style="display:flex;justify-content:space-between;align-items:center;">
                            طلب #${o.order_number}
                            <button class="btn btn-sm btn-outline" onclick="closeModal()">✕</button>
                        </h2>
                        ${statusFlow}
                        <div class="detail-row"><span>المشتري</span><span><strong>${buyerName}</strong></span></div>
                        <div class="detail-row"><span>المبلغ الإجمالي</span><span style="font-weight:700;color:var(--primary);">${formatPrice(o.total_amount || o.total)}</span></div>
                        <div class="detail-row"><span>طريقة الدفع</span><span>${paymentMap[o.payment_method] || o.payment_method || '-'}</span></div>
                        <div class="detail-row"><span>عنوان الشحن</span><span>${o.shipping_address || '-'}</span></div>
                        <div class="detail-row"><span>الولاية</span><span>${o.wilaya || '-'}</span></div>
                        <div class="detail-row"><span>تاريخ الطلب</span><span>${formatDateTime(o.created_at)}</span></div>
                        ${o.notes ? `<div class="detail-row"><span>ملاحظات</span><span>${o.notes}</span></div>` : ''}
                        
                        <h3 style="margin:20px 0 10px;">📦 المنتجات (${items.length})</h3>
                        <table>
                            <thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>المجموع</th></tr></thead>
                            <tbody>
                                ${items.map(i => `
                                    <tr>
                                        <td>
                                            <div style="display:flex;align-items:center;gap:8px;">
                                                ${i.image_url ? `<img src="${getImageUrl(i.image_url)}" onerror="this.style.display='none'" style="width:32px;height:32px;border-radius:6px;object-fit:cover;" alt="">` : ''}
                                                <span>${i.product_name || '-'}</span>
                                            </div>
                                        </td>
                                        <td>${i.quantity}</td>
                                        <td>${formatPrice(i.price)}</td>
                                        <td style="font-weight:600;">${formatPrice(i.quantity * i.price)}</td>
                                    </tr>
                                `).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--gray);">لا توجد تفاصيل</td></tr>'}
                            </tbody>
                        </table>
                        
                        ${!isCancelled ? `
                        <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
                            <label style="font-size:14px;font-weight:600;display:block;margin-bottom:10px;">تغيير الحالة:</label>
                            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                                <button class="btn btn-sm btn-outline" onclick="updateOrderStatus('${o.id}','confirmed')" ${o.status === 'confirmed' ? 'disabled' : ''}>✓ تأكيد</button>
                                <button class="btn btn-sm btn-primary" onclick="updateOrderStatus('${o.id}','processing')" ${o.status === 'processing' ? 'disabled' : ''}>📦 تحضير</button>
                                <button class="btn btn-sm btn-outline" onclick="updateOrderStatus('${o.id}','shipped')" ${o.status === 'shipped' ? 'disabled' : ''} style="${o.status !== 'shipped' ? 'background:#3B82F6;color:white;border-color:#3B82F6;' : ''}">🚚 شحن</button>
                                <button class="btn btn-sm btn-success" onclick="updateOrderStatus('${o.id}','delivered')" ${o.status === 'delivered' ? 'disabled' : ''}>✅ تم التوصيل</button>
                                <button class="btn btn-sm btn-danger" onclick="updateOrderStatus('${o.id}','cancelled')">❌ إلغاء</button>
                            </div>
                        </div>` : ''}
                    </div>
                </div>`;
        } catch (err) {
            showNotification(err.message, 'error');
        }
    }

    async function updateOrderStatus(id, status) {
        if (status === 'cancelled' && !confirmAction('هل أنت متأكد من إلغاء هذا الطلب؟')) return;
        try {
            await apiRequest(`/admin/orders/${id}/status`, {
                method: 'PUT',
                body: JSON.stringify({ status })
            });
            showNotification('تم تحديث حالة الطلب بنجاح');
            closeModal();
            loadOrders();
        } catch (err) {
            showNotification(err.message, 'error');
        }
    }

    function closeModal() {
        document.getElementById('orderModal').style.display = 'none';
    }
</script>
</body>
</html>
